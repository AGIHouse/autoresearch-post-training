# Dr. GRPO configuration — removes length and std normalization biases
#
# Based on DeepSWE (Together AI) and Dr.GRPO paper:
# - Standard GRPO's length normalization biases toward verbose incorrect answers
# - Binary rewards work better than partial credit for coding tasks

# Model
model_name: "Qwen/Qwen2.5-Coder-7B-Instruct"

# GRPO — key differences from default
loss_type: "dr_grpo"
beta: 0.0
scale_rewards: false

# Binary rewards
reward_mode: "binary"
reward_weights:
  - 1.0
  - 0.1

# Everything else same as default
num_generations: 8
max_prompt_length: 512
max_completion_length: 1024
temperature: 0.9
learning_rate: 5.0e-6
per_device_train_batch_size: 2
gradient_accumulation_steps: 4
max_steps: 200
lora_r: 64
lora_alpha: 128
bf16: true
gradient_checkpointing: true
use_vllm: true
vllm_mode: "colocate"
vllm_gpu_memory_utilization: 0.45
dataset_name: "rlvr"
sandbox_backend: "subprocess"
output_dir: "./outputs"
wandb_project: "coding-agent-rl"
